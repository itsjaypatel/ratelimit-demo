spring.application.name=ratelimit-demo

spring.data.redis.host=localhost
spring.data.redis.port=6379

# Use small capacity so tests complete quickly
rate-limit.token-bucket.tiers.FREE.capacity=100
rate-limit.token-bucket.tiers.FREE.refill-rate=10

rate-limit.token-bucket.tiers.PRO.capacity=1000
rate-limit.token-bucket.tiers.PRO.refill-rate=50

rate-limit.token-bucket.tiers.MAX.capacity=10000
rate-limit.token-bucket.tiers.MAX.refill-rate=200

rate-limit.whitelist.ips=127.0.0.1,::1
rate-limit.whitelist.paths=/actuator/health